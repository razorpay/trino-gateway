# AI Week Score — Signal Exceptions & Aliases
#
# Two supported formats per repo:
#
# Format 1 — Exceptions only (shorthand, existing convention):
#   <repo-name>:
#     - signal: <id>
#       reason: <why>
#       owner: <handle>
#       added: YYYY-MM-DD
#
# Format 2 — Dict with optional keys (needed for aliases or both):
#   <repo-name>:
#     exceptions:                       # same list as Format 1
#       - signal: <id>
#         reason: <why>
#         owner: <handle>
#         added: YYYY-MM-DD
#     spinacode_aliases:                # for monorepos where Spinnaker app ≠ repo name
#       - <spinnaker-app-1>
#       - <spinnaker-app-2>
#
# The scorer handles both: if the value is a list, it's exceptions.
# If it's a dict, read .exceptions and .spinacode_aliases.
#
# Signal IDs:
#   Context  : C1, C2, C3
#   Testing  : T1-UT, T1-SLIT, T1-E2E, T2, T3, T4-Uptime, T4-E2E
#   CI/CD    : D1, D2, D3, D4
#
# How exceptions work:
#   - Excepted signals are marked N/A in the output table.
#   - Their max points are subtracted from the pillar denominator before
#     computing the pillar % and the aggregate.
#   - All other signals are scored normally.
#
# How spinacode_aliases work:
#   - D2 checks each alias folder in spinacode and scores using the best match.
#   - Skips the standard 3-pass lookup when aliases are present.
#
# To add an entry: open a PR, get one peer approval.
# Keep entries sorted alphabetically by repo name.
# ─────────────────────────────────────────────────────────────────────────────

